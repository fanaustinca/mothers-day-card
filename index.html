<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Mother's Day</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: linear-gradient(155deg, #fff5f8 0%, #fce4ec 55%, #fff9e6 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, 'Times New Roman', serif;
}

.card {
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  box-shadow: 0 12px 50px rgba(180,80,110,0.15), 0 2px 8px rgba(180,80,110,0.08);
  padding: 34px 36px 28px;
  max-width: 460px; width: 95vw; text-align: center;
  transition: opacity 0.6s ease;
}

h1 { font-size: 1.85em; color: #b03060; letter-spacing: 0.5px; margin-bottom: 4px; }
.year { color: #d4849a; font-size: 0.8em; letter-spacing: 3px; margin-bottom: 16px; }

#hint {
  font-size: 0.88em; color: #b07080; font-style: italic;
  min-height: 1.4em; margin-bottom: 8px; transition: opacity 0.4s;
}

#bouquet { display: block; margin: 0 auto; width: 100%; max-width: 420px; overflow: visible; }

#gate {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(155deg, #fff5f8 0%, #fce4ec 55%, #fff9e6 100%);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
}
#gate-box {
  text-align: center; padding: 44px 40px;
  background: rgba(255,255,255,0.93);
  border-radius: 28px;
  box-shadow: 0 12px 50px rgba(180,80,110,0.15);
  width: 90vw; max-width: 360px;
}
#gate-box .rose { font-size: 2.4em; margin-bottom: 14px; }
#gate-box p { color: #b03060; font-size: 1.05em; margin-bottom: 22px; }
#gate-input {
  width: 100%; padding: 10px 14px; font-size: 1em;
  font-family: Georgia, serif; color: #8b2040;
  border: 1.5px solid #f5b0c5; border-radius: 10px;
  outline: none; text-align: center; margin-bottom: 14px;
  background: #fff8fb;
}
#gate-input:focus { border-color: #e05575; }
#gate-btn {
  padding: 10px 28px; font-size: 1em;
  font-family: Georgia, serif; cursor: pointer;
  background: linear-gradient(135deg,#e05575,#c0395a);
  color: #fff; border: none; border-radius: 10px;
  letter-spacing: 0.4px; transition: opacity 0.2s;
}
#gate-btn:hover { opacity: 0.88; }
#gate-err {
  margin-top: 14px; font-size: 0.88em;
  color: #b07080; font-style: italic; min-height: 1.3em;
}
</style>
</head>
<body>

<div id="gate">
  <div id="gate-box">
    <div class="rose">🌸</div>
    <p>Who is opening this card?</p>
    <input id="gate-input" type="text" placeholder="Your name…" autocomplete="off">
    <br>
    <button id="gate-btn" onclick="checkGate()">Open Card</button>
    <div id="gate-err"></div>
  </div>
</div>

<script>
function checkGate() {
  const name = document.getElementById('gate-input').value.trim().toLowerCase();
  if (name === 'leah') {
    const err = document.getElementById('gate-err');
    err.textContent = 'This card isn\'t ready for you yet! 🙈';
    document.getElementById('gate-input').value = '';
    return;
  }
  if (!name) { document.getElementById('gate-err').textContent = 'Please enter your name first!'; return; }
  const gate = document.getElementById('gate');
  gate.style.opacity = '0';
  setTimeout(() => gate.remove(), 520);
}
document.getElementById('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkGate(); });
</script>

<div class="card">
  <h1>Happy Mother's Day</h1>
  <p class="year">2 0 2 6</p>
  <p id="hint">✨ Every flower holds a secret — click them all</p>
  <svg id="bouquet" viewBox="0 0 400 310"></svg>
</div>

<script>
(function () {
  const NS  = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('bouquet');

  // ── Visited tracking ───────────────────────────────────────────────
  const visited  = new Set();
  const TOTAL    = 7;
  let   exploded = false;

  function tryExplode(id) {
    visited.add(id);
    if (exploded || visited.size < TOTAL) return;
    exploded = true;
    setHint('🌸 You found them all!');
    setTimeout(() => {
      if (overlayEl) closeOverlay();
      setTimeout(triggerExplosion, overlayEl ? 600 : 0);
    }, 1400);
  }

  // ── SVG / overlay helpers ──────────────────────────────────────────
  let overlayEl   = null;
  let hintOverEl  = null;
  let onCloseHook = null;

  function mk(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }

  function petalD(w, h) {
    const hw = w / 2;
    return `M 0 0 C ${-hw} ${-h*.26} ${-hw} ${-h*.68} 0 ${-h} C ${hw} ${-h*.68} ${hw} ${-h*.26} 0 0 Z`;
  }

  // ── Fullscreen flower overlay ──────────────────────────────────────
  function showOverlay(cfg) {
    if (overlayEl) {
      onCloseHook?.(); onCloseHook = null;
      overlayEl.remove(); overlayEl = null;
      hintOverEl?.remove(); hintOverEl = null;
    }
    onCloseHook = cfg.onClose || null;

    overlayEl = document.createElement('div');
    Object.assign(overlayEl.style, {
      position:'fixed', inset:'0', zIndex:'200',
      background:'rgba(255,245,248,0.97)',
      display:'flex', alignItems:'center', justifyContent:'center',
      cursor:'pointer', opacity:'0', transition:'opacity 0.5s ease'
    });
    document.body.appendChild(overlayEl);

    hintOverEl = document.createElement('p');
    Object.assign(hintOverEl.style, {
      position:'fixed', bottom:'22px', left:'50%',
      transform:'translateX(-50%)', zIndex:'201',
      fontFamily:'Georgia,serif', fontSize:'0.85em',
      color:'#b07080', fontStyle:'italic',
      pointerEvents:'none', opacity:'0',
      transition:'opacity 0.5s ease 2s', whiteSpace:'nowrap'
    });
    hintOverEl.textContent = 'Tap anywhere to close';
    document.body.appendChild(hintOverEl);

    const FULL_L = 55, scale = FULL_L / cfg.pL;
    const pL = FULL_L, pW = Math.round(cfg.pW * scale);
    const { n, outer, inner, msg } = cfg;

    const fsvg = mk('svg', { viewBox:'-66 -66 132 132', preserveAspectRatio:'xMidYMid meet' });
    fsvg.style.cssText = 'width:90vmin;height:90vmin;pointer-events:none;overflow:visible';

    const fps = [];
    for (let i = 0; i < n; i++) {
      const gr = mk('g', { transform:`rotate(${i*360/n})` });
      const p  = mk('path', { d:petalD(pW,pL), fill:outer, opacity:'0.9' });
      p.style.cssText = `transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.07) scaleX(0.22);transition:transform 0.9s cubic-bezier(0.34,1.42,0.64,1) ${(i*0.5/n).toFixed(3)}s`;
      gr.appendChild(p); fsvg.appendChild(gr); fps.push(p);
    }
    for (let i = 0; i < n; i++) {
      const gr = mk('g', { transform:`rotate(${i*360/n+180/n})` });
      const p  = mk('path', { d:petalD(pW*.75,pL*.82), fill:inner, opacity:'0.85' });
      p.style.cssText = `transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.07) scaleX(0.22);transition:transform 0.9s cubic-bezier(0.34,1.42,0.64,1) ${(0.025+i*0.5/n).toFixed(3)}s`;
      gr.appendChild(p); fsvg.appendChild(gr); fps.push(p);
    }

    const ring = mk('circle', { cx:'0',cy:'0',r:'22',
      fill:'rgba(255,240,244,0.90)',stroke:'rgba(200,130,150,0.45)','stroke-width':'0.4' });
    ring.style.cssText = 'transform-box:fill-box;transform-origin:50% 50%;transform:scale(0);transition:transform 0.7s cubic-bezier(0.34,1.3,0.64,1) 0.55s';
    fsvg.appendChild(ring);

    const lh = 6.2, sy = -(lh*(msg.length-1))/2;
    const textEls = msg.map((line, i) => {
      const t = mk('text', { x:'0', y:String(sy+i*lh), 'text-anchor':'middle',
        'dominant-baseline':'central', 'font-family':'Georgia, serif',
        'font-size':'4', fill:'#8b2040' });
      t.style.cssText = `opacity:0;transition:opacity 0.55s ease ${(1.3+i*0.18).toFixed(2)}s`;
      t.textContent = line;
      fsvg.appendChild(t);
      return t;
    });

    overlayEl.appendChild(fsvg);
    overlayEl.addEventListener('click', closeOverlay);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      overlayEl.style.opacity = '1';
      hintOverEl.style.opacity = '1';
      fps.forEach(p => { p.style.transform = 'scaleY(1) scaleX(1)'; });
      ring.style.transform = 'scale(1)';
      textEls.forEach(t => { t.style.opacity = '1'; });
    }));
  }

  function closeOverlay() {
    if (!overlayEl) return;
    overlayEl.style.opacity = '0';
    hintOverEl && (hintOverEl.style.opacity = '0');
    const hook = onCloseHook; onCloseHook = null;
    setTimeout(() => {
      overlayEl?.remove(); overlayEl = null;
      hintOverEl?.remove(); hintOverEl = null;
      hook?.();
    }, 500);
  }

  function setHint(text) {
    const el = document.getElementById('hint');
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 400);
  }

  // ── Palette shared between leaf rain and flowers ───────────────────
  const PALETTE = [
    ['#e878a8','#f0a8cc'],['#ab47bc','#ce93d8'],
    ['#e05575','#ef8098'],['#ff8a65','#ffb085'],
    ['#f06292','#f8a0b8'],['#80cbc4','#a8dcd8'],
    ['#f48fb1','#f8b8cc'],
  ];

  // ── Leaf rain ──────────────────────────────────────────────────────
  function showLeafRain(onComplete) {
    const W = window.innerWidth, H = window.innerHeight;
    const COLORS = ['#4a7c35','#5a8c3c','#3d6b2a','#6ba050','#508040','#427535','#63954a','#3a6828','#2e5c1f','#7ab84e'];

    // Dark green wash that fades in behind the leaves
    const bg = document.createElement('div');
    bg.style.cssText = 'position:fixed;inset:0;z-index:298;pointer-events:none;background:rgba(22,48,12,0);transition:background 2.2s ease';
    document.body.appendChild(bg);
    requestAnimationFrame(() => requestAnimationFrame(() => { bg.style.background = 'rgba(22,48,12,0.65)'; }));

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    canvas.style.cssText = 'position:fixed;inset:0;z-index:299;pointer-events:none';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');

    const PATHS = [
      new Path2D('M 0 2 C -10 -3 -12 -14 0 -22 C 12 -14 10 -3 0 2 Z'),
      new Path2D('M 0 2 C -8 -2 -10 -13 0 -24 C 10 -13 8 -2 0 2 Z'),
      new Path2D('M 0 2 C -12 -3 -13 -12 0 -19 C 13 -12 12 -3 0 2 Z'),
    ];

    // Grid of final positions guarantees full-screen coverage
    const cell = Math.max(34, Math.min(68, Math.sqrt(W * H / 200)));
    const cols = Math.ceil(W / cell) + 1;
    const rows = Math.ceil(H / cell) + 1;

    const leaves = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const tx = c * cell + (Math.random() - 0.5) * cell * 0.55 + cell / 2;
        const ty = r * cell + (Math.random() - 0.5) * cell * 0.45 + cell / 2;
        leaves.push({
          sx:       Math.random() * W,
          tx:       Math.max(0, Math.min(W, tx)),
          ty:       Math.max(0, Math.min(H, ty)),
          rot:      Math.random() * Math.PI * 2,
          rotDelta: (Math.random() - 0.5) * Math.PI * 3,
          // Wave: top of screen fills first, bottom last
          delay:    (ty / H) * 2.0 + Math.random() * 0.55,
          duration: 0.62 + Math.random() * 0.55,
          size:     cell * (0.85 + Math.random() * 0.40),
          color:    COLORS[Math.floor(Math.random() * COLORS.length)],
          pathIdx:  Math.floor(Math.random() * 3),
        });
      }
    }

    let t0 = null;
    (function frame(ts) {
      if (!t0) t0 = ts;
      const el = (ts - t0) / 1000;
      ctx.clearRect(0, 0, W, H);

      let done = true;
      for (const lf of leaves) {
        if (el < lf.delay) { done = false; continue; }
        const t = Math.min((el - lf.delay) / lf.duration, 1);
        if (t < 1) done = false;

        const x   = lf.sx + (lf.tx - lf.sx) * (1 - (1 - t) * (1 - t));
        const y   = -42 + (lf.ty + 42) * (t * t);
        const rot = lf.rot + lf.rotDelta * t;
        const a   = Math.min(t * 7, 0.96);
        const s   = lf.size / 26;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.scale(s, s);
        ctx.globalAlpha = a;
        ctx.fillStyle = lf.color;
        ctx.fill(PATHS[lf.pathIdx]);
        ctx.strokeStyle = 'rgba(255,255,255,0.22)';
        ctx.lineWidth = 0.85;
        ctx.beginPath();
        ctx.moveTo(0, 1);  ctx.lineTo(0, -21);
        ctx.moveTo(0, -6); ctx.lineTo(-6, -12);
        ctx.moveTo(0, -6); ctx.lineTo( 6, -12);
        ctx.moveTo(0,-13); ctx.lineTo(-5, -18);
        ctx.moveTo(0,-13); ctx.lineTo( 5, -18);
        ctx.stroke();
        ctx.restore();
      }

      if (!done) { requestAnimationFrame(frame); return; }

      // All landed — hold briefly, then fade out everything
      setTimeout(() => {
        let a = 1;
        (function fade() {
          a -= 0.022;
          const v = Math.max(a, 0).toFixed(3);
          canvas.style.opacity = v;
          bg.style.opacity = v;
          if (a > 0) requestAnimationFrame(fade);
          else { canvas.remove(); bg.remove(); onComplete(); }
        })();
      }, 500);
    })(0);
  }

  // ── Bouncing flowers ───────────────────────────────────────────────
  function startBouncingFlowers(bx, by) {
    const shell = document.createElement('div');
    shell.style.cssText = 'position:fixed;inset:0;z-index:300;overflow:hidden';
    document.body.appendChild(shell);

    const COUNT   = 16;
    const GRAVITY = 290;
    const flowers = [];

    for (let i = 0; i < COUNT; i++) {
      const angle = (i / COUNT) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
      const speed = 190 + Math.random() * 300;
      const size  = 85 + Math.random() * 65;
      const [outer, inner] = PALETTE[i % PALETTE.length];
      const n = [5, 6, 7, 8][i % 4];

      const x0 = bx - size/2 + (Math.random()-0.5)*28;
      const y0 = by - size/2 + (Math.random()-0.5)*28;

      const div = document.createElement('div');
      div.style.cssText = [
        'position:absolute', `left:${x0}px`, `top:${y0}px`,
        `width:${size}px`, `height:${size}px`,
        'cursor:grab', 'will-change:transform,left,top',
      ].join(';');

      const msvg = mk('svg', { viewBox:'-13 -13 26 26' });
      msvg.style.cssText = `width:${size}px;height:${size}px;display:block;pointer-events:none`;

      const pL = 10, pW = Math.round(10 * 8/n * 0.78);
      const fps = [];

      for (let j = 0; j < n; j++) {
        const gr = mk('g', { transform:`rotate(${j*360/n})` });
        const p  = mk('path', { d:petalD(pW, pL), fill:outer, opacity:'0.92' });
        p.style.cssText = 'transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.1) scaleX(0.2);transition:transform 0.7s cubic-bezier(0.34,1.42,0.64,1)';
        gr.appendChild(p); msvg.appendChild(gr); fps.push(p);
      }
      for (let j = 0; j < n; j++) {
        const gr = mk('g', { transform:`rotate(${j*360/n+180/n})` });
        const p  = mk('path', { d:petalD(Math.round(pW*.7), Math.round(pL*.82)), fill:inner, opacity:'0.82' });
        p.style.cssText = 'transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.1) scaleX(0.2);transition:transform 0.7s cubic-bezier(0.34,1.42,0.64,1)';
        gr.appendChild(p); msvg.appendChild(gr); fps.push(p);
      }
      msvg.appendChild(mk('circle', { cx:'0',cy:'0',r:'2.5',fill:'#fdd835' }));

      div.appendChild(msvg);
      shell.appendChild(div);

      flowers.push({
        el:div, x:x0, y:y0, size,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        angle:Math.random()*360,
        omega:(Math.random()-0.5)*260,
        dragging:false,
      });

      const bd = 120 + i*22;
      setTimeout(() => {
        fps.forEach((p, j) => {
          p.style.transitionDelay = `${(j*0.05).toFixed(3)}s`;
          p.style.transform = 'scaleY(1) scaleX(1)';
        });
      }, bd);
    }

    // ── Physics loop ───────────────────────────────────────────────
    let lastTs = null;
    (function loop(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs)/1000, 0.05);
      lastTs = ts;
      const W = window.innerWidth, H = window.innerHeight;

      flowers.forEach(f => {
        if (f.dragging) {
          f.el.style.left = f.x + 'px';
          f.el.style.top  = f.y + 'px';
          return;
        }
        f.vy    += GRAVITY * dt;
        f.x     += f.vx * dt;
        f.y     += f.vy * dt;
        f.angle += f.omega * dt;

        if (f.x < 0)          { f.x = 0;          f.vx =  Math.abs(f.vx); }
        if (f.x+f.size > W)   { f.x = W-f.size;   f.vx = -Math.abs(f.vx); }
        if (f.y < 0)          { f.y = 0;           f.vy =  Math.abs(f.vy); }
        if (f.y+f.size > H)   { f.y = H-f.size;   f.vy = -Math.abs(f.vy)*0.82; }

        f.el.style.left      = f.x + 'px';
        f.el.style.top       = f.y + 'px';
        f.el.style.transform = `rotate(${f.angle}deg)`;
      });
      requestAnimationFrame(loop);
    })(0);

    // ── Drag / fling ───────────────────────────────────────────────
    let dragF = null, dox = 0, doy = 0, dHist = [];

    function hitTest(cx, cy) {
      for (let i = flowers.length-1; i >= 0; i--) {
        const f = flowers[i];
        if (cx >= f.x && cx <= f.x+f.size && cy >= f.y && cy <= f.y+f.size) return f;
      }
      return null;
    }

    function grab(f, cx, cy) {
      dragF = f; f.dragging = true; f.vx = f.vy = 0;
      dox = cx - f.x; doy = cy - f.y;
      f.el.style.cursor = 'grabbing';
      dHist = [{x:cx, y:cy, t:performance.now()}];
    }

    function drag(cx, cy) {
      if (!dragF) return;
      dragF.x = cx - dox;
      dragF.y = cy - doy;
      const now = performance.now();
      dHist.push({x:cx, y:cy, t:now});
      while (dHist.length > 1 && now - dHist[0].t > 90) dHist.shift();
    }

    function release() {
      if (!dragF) return;
      if (dHist.length >= 2) {
        const a = dHist[0], b = dHist[dHist.length-1];
        const dt = (b.t - a.t) / 1000;
        if (dt > 0.01) {
          dragF.vx = (b.x - a.x) / dt;
          dragF.vy = (b.y - a.y) / dt;
          const spd = Math.hypot(dragF.vx, dragF.vy);
          if (spd > 3200) { const s = 3200/spd; dragF.vx *= s; dragF.vy *= s; }
        }
      }
      dragF.el.style.cursor = 'grab';
      dragF.dragging = false;
      dragF = null; dHist = [];
    }

    shell.addEventListener('mousedown', e => {
      const f = hitTest(e.clientX, e.clientY);
      if (f) { grab(f, e.clientX, e.clientY); e.preventDefault(); }
    });
    document.addEventListener('mousemove', e => { if (dragF) drag(e.clientX, e.clientY); });
    document.addEventListener('mouseup', release);

    shell.addEventListener('touchstart', e => {
      const t = e.touches[0], f = hitTest(t.clientX, t.clientY);
      if (f) { grab(f, t.clientX, t.clientY); e.preventDefault(); }
    }, {passive:false});
    document.addEventListener('touchmove', e => {
      if (dragF) { drag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }
    }, {passive:false});
    document.addEventListener('touchend', release);

    // ── Celebration message ────────────────────────────────────────
    const msg = document.createElement('div');
    Object.assign(msg.style, {
      position:'fixed', top:'50%', left:'50%',
      transform:'translate(-50%,-50%)', zIndex:'302',
      textAlign:'center', fontFamily:'Georgia,serif', color:'#8b2040',
      opacity:'0', transition:'opacity 0.8s ease', pointerEvents:'none',
      textShadow:'0 1px 16px rgba(255,255,255,1), 0 0 40px rgba(255,255,255,0.95)'
    });
    msg.innerHTML = `
      <div style="font-size:3em;margin-bottom:6px">🌸</div>
      <div style="font-size:1.7em;font-weight:bold;letter-spacing:0.5px;margin-bottom:5px">You found them all!</div>
      <div style="font-size:1em;font-style:italic">Happy Mother's Day</div>
    `;
    document.body.appendChild(msg);
    requestAnimationFrame(() => requestAnimationFrame(() => { msg.style.opacity = '1'; }));
    setTimeout(() => { msg.style.transition = 'opacity 1s ease'; msg.style.opacity = '0'; }, 3200);
    setTimeout(() => msg.remove(), 4300);
  }

  // ── Trigger: fade card → leaf rain → bouncing flowers ─────────────
  function triggerExplosion() {
    // Pre-compute burst origin before card fades
    const rect = document.getElementById('bouquet').getBoundingClientRect();
    const bx   = rect.left + (197/400) * rect.width;
    const by   = rect.top  + (230/310) * rect.height;

    const card = document.querySelector('.card');
    card.style.opacity = '0';
    card.style.pointerEvents = 'none';

    showLeafRain(() => startBouncingFlowers(bx, by));
  }

  // ── Bouquet flower builders ────────────────────────────────────────
  function staticFlower(cx, cy, n, pLen, pWid, outer, inner, cCol, cR, msg, id) {
    const g = mk('g');
    g.style.cursor = 'pointer';
    for (let i = 0; i < n; i++) {
      const gr = mk('g', { transform:`translate(${cx},${cy}) rotate(${i*360/n})` });
      gr.appendChild(mk('path', { d:petalD(pWid,pLen), fill:outer, opacity:'0.88' }));
      g.appendChild(gr);
    }
    g.appendChild(mk('circle', { cx, cy, r:cR, fill:cCol }));
    svg.appendChild(g);
    g.addEventListener('click', e => {
      e.stopPropagation();
      tryExplode(id);
      showOverlay({ n, pL:pLen, pW:pWid, outer, inner, msg });
    });
  }

  function specialFlower(cx, cy) {
    const g = mk('g', { id:'sflower' });
    g.style.cursor = 'pointer';

    const n = 8, pL = 52, pW = 22;
    const allPetals = [];

    for (let i = 0; i < n; i++) {
      const gr = mk('g', { transform:`translate(${cx},${cy}) rotate(${i*45})` });
      const p  = mk('path', { d:petalD(pW,pL), fill:'#e05575' });
      p.style.cssText = 'transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.07) scaleX(0.22);transition:transform 0.9s cubic-bezier(0.34,1.42,0.64,1)';
      gr.appendChild(p); g.appendChild(gr); allPetals.push(p);
    }
    for (let i = 0; i < n; i++) {
      const gr = mk('g', { transform:`translate(${cx},${cy}) rotate(${i*45+22.5})` });
      const p  = mk('path', { d:petalD(pW*.75,pL*.82), fill:'#ef8098' });
      p.style.cssText = 'transform-box:fill-box;transform-origin:50% 100%;transform:scaleY(0.07) scaleX(0.22);transition:transform 0.9s cubic-bezier(0.34,1.42,0.64,1)';
      gr.appendChild(p); g.appendChild(gr); allPetals.push(p);
    }

    const sepalG = mk('g');
    for (let i = 0; i < 5; i++) {
      const gr = mk('g', { transform:`translate(${cx},${cy}) rotate(${i*72})` });
      const s  = mk('path', { d:petalD(9,22), fill:'#4a7c35' });
      s.style.cssText = 'opacity:0.95;transition:opacity 0.55s ease 0.1s';
      gr.appendChild(s); sepalG.appendChild(gr);
    }
    g.appendChild(sepalG);

    const dot = mk('circle', { cx, cy, r:'9', fill:'#ffc107' });
    dot.style.transition = 'opacity 0.3s ease 0.4s';
    g.appendChild(dot);
    svg.appendChild(g);

    let budOpen = false;

    function bloom() {
      allPetals.forEach((p, i) => {
        p.style.transitionDelay = `${(i*0.065).toFixed(3)}s`;
        p.style.transform = 'scaleY(1) scaleX(1)';
      });
      sepalG.querySelectorAll('path').forEach(s => { s.style.opacity = '0'; });
      dot.style.opacity = '0';
    }

    function unbloom() {
      allPetals.forEach(p => {
        p.style.transitionDelay = '0s';
        p.style.transform = 'scaleY(0.07) scaleX(0.22)';
      });
      setTimeout(() => {
        sepalG.querySelectorAll('path').forEach(s => { s.style.opacity = '0.95'; });
        dot.style.opacity = '1';
        budOpen = false;
      }, 600);
    }

    g.addEventListener('click', e => {
      e.stopPropagation();
      if (budOpen) return;
      budOpen = true;
      tryExplode('special');
      bloom();
      showOverlay({
        n:8, pL:52, pW:22,
        outer:'#e05575', inner:'#ef8098',
        msg:['With all','my love','♥'],
        onClose:unbloom
      });
    });
  }

  // ── Assemble bouquet ───────────────────────────────────────────────
  const WX = 197, WY = 272;

  [
    {fx:96,  fy:118, cp:[138,207]},
    {fx:155, fy:80,  cp:[163,186]},
    {fx:220, fy:68,  cp:[210,178]},
    {fx:280, fy:78,  cp:[243,186]},
    {fx:340, fy:116, cp:[265,205]},
    {fx:133, fy:155, cp:[158,222]},
    {fx:261, fy:150, cp:[240,222]},
  ].forEach(({fx,fy,cp:[cpx,cpy]}) => {
    svg.appendChild(mk('path', {
      d:`M ${WX} ${WY} Q ${cpx} ${cpy} ${fx} ${fy+14}`,
      stroke:'#5a8c3c','stroke-width':'2.5',fill:'none','stroke-linecap':'round'
    }));
  });

  [[147,207,-40,8,16],[172,224,18,7,14],[230,215,26,9,17],
   [264,220,-23,7,14],[120,238,-52,6,12],[288,231,42,6,12]]
  .forEach(([x,y,rot,rx,ry]) => {
    const g = mk('g', { transform:`translate(${x},${y}) rotate(${rot})` });
    g.appendChild(mk('ellipse', { cx:0,cy:0,rx,ry,fill:'#5a8c3c',opacity:'0.82' }));
    svg.appendChild(g);
  });

  svg.appendChild(mk('path', {
    d:`M ${WX-30} ${WY-8} C ${WX-14} ${WY+10} ${WX+14} ${WY+10} ${WX+30} ${WY-8}`,
    stroke:'#c0395a','stroke-width':'3',fill:'none','stroke-linecap':'round'
  }));
  [[-20,2,-38,28],[20,2,38,28]].forEach(([x1,y1,x2,y2]) => {
    svg.appendChild(mk('path', {
      d:`M ${WX+x1} ${WY+y1} L ${WX+x2} ${WY+y2}`,
      stroke:'#e05575','stroke-width':'2.5',fill:'none','stroke-linecap':'round'
    }));
  });

  //          cx   cy  n  pL  pW  outer      inner      center     cR  message                          id
  staticFlower( 96,111, 6,28,14, '#e878a8','#f0a8cc','#fdd835', 8, ['You are',   'my sunshine', '☀' ],0);
  staticFlower(155, 73, 8,24,12, '#ab47bc','#ce93d8','#fff176', 7, ['Thank you', 'for everything','★' ],1);
  staticFlower(280, 71, 7,27,13, '#ff8a65','#ffb085','#ff7043', 8, ['My forever','hero',          '♥' ],2);
  staticFlower(340,109, 5,30,15, '#f06292','#f8a0b8','#fff176', 9, ['You make',  'me smile',      '♥' ],3);
  staticFlower(133,148, 6,22,11, '#80cbc4','#a8dcd8','#fdd835', 7, ['My guiding','light',          '★' ],4);
  staticFlower(261,143, 8,23,12, '#f48fb1','#f8b8cc','#fff176', 7, ['Always in', 'my heart',       '♥' ],5);

  specialFlower(220, 62);
})();
